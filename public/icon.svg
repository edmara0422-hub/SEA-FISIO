<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sea-bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111214" />
      <stop offset="1" stop-color="#030303" />
    </linearGradient>
    <linearGradient id="sea-text" x1="0" y1="340" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.48" stop-color="#D7DBE2" />
      <stop offset="1" stop-color="#8B9199" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.01" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#sea-bg)" />
  <rect x="18" y="18" width="988" height="988" stroke="url(#border-grad)" stroke-width="1.5" fill="none" />

  <!-- x=502 compensa o letter-spacing de 20 (20/2=10 offset) -->
  <text
    x="502"
    y="598"
    text-anchor="middle"
    fill="url(#sea-text)"
    font-family="Poppins, Avenir Next, Segoe UI, sans-serif"
    font-size="330"
    font-weight="600"
    letter-spacing="20"
  >SEA</text>
</svg>
