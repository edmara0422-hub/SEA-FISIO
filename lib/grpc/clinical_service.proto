syntax = "proto3";

package sea.api;

service ClinicalService {
  rpc CalculateVMIndices (VMRequest) returns (VMResponse);
  rpc GetPatient (PatientRequest) returns (PatientResponse);
  rpc StreamPatientUpdates (PatientRequest) returns (stream PatientUpdate);
  rpc AnalyzeWithAI (AIRequest) returns (AIResponse);
}

message VMRequest {
  string patient_id = 1;
  int32 respiratory_rate = 2;
  int32 tidal_volume = 3;
  int32 peep = 4;
  int32 peak_pressure = 5;
  int32 plateau_pressure = 6;
}

message VMResponse {
  string patient_id = 1;
  double compliance = 2;
  double resistance = 3;
  double driving_pressure = 4;
  double rsbi = 5;
  double pf_ratio = 6;
  string recommendations = 7;
  int64 calculated_at = 8;
}

message PatientRequest {
  string patient_id = 1;
}

message PatientResponse {
  string id = 1;
  string name = 2;
  int32 age = 3;
  string diagnosis = 4;
  map<string, double> current_parameters = 5;
  int64 last_update = 6;
}

message PatientUpdate {
  string patient_id = 1;
  map<string, double> parameters = 2;
  string event_type = 3;
  int64 timestamp = 4;
}

message AIRequest {
  string query = 1;
  string context_type = 2;
  map<string, string> clinical_data = 3;
}

message AIResponse {
  string content = 1;
  string reasoning = 2;
  double confidence = 3;
  repeated string sources = 4;
  int64 processed_at = 5;
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  string message = 3;
}
